<body>

    <h1>縛り</h1>
    <div class="card">
        <h2 class="card-title">概要</h2>
        <p class="card-desc">同じマークが連続して出た場合、その場が流れるまでそのマークしか出せなくなるルールです。</p>
        <ul class="rule-list daifugo-list" style="margin-top: 15px;">
            <li><b>片縛り:</b> ハートの3 → ハートの5 と出た場合、次はハートしか出せません。</li>
            <li><b>激しば（両縛り）:</b> ハートの3・スペードの3 → ハートの5・スペードの5 と出た場合、以降はハートとスペードのペアしか出せません。</li>
            <li>縛りが発生すると、手札を出すのが難しくなるため戦略性が増します。</li>
        </ul>
    </div>
    <script src="../app.js"></script>
</body>
