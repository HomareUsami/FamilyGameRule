    <h1>クーデター / オーメン</h1>
    <div class="card">
        <h2 class="card-title">概要</h2>
        <p class="card-desc">特定の数字を「3枚」同時に出すことで、革命（カードの強さ逆転）を起こすことができるルールです。</p>
        <ul class="rule-list daifugo-list" style="margin-top: 15px;">
            <li><b>クーデター:</b> 「9」を3枚出すと革命が起きます。（語呂合わせ: 9×3=27=クーデターに似た響き、等の説あり）</li>
            <li><b>オーメン:</b> 「6」を3枚出すと革命が起きます。（映画の「666」に由来します）</li>
            <li>通常は4枚必要な革命が3枚で起こせるため、大貧民が一発逆転を狙いやすくなります。</li>
        </ul>
    </div>
