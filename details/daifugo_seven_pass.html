    <div class="card">
        <h2 class="card-title">概要</h2>
        <p class="card-desc">「7」を出した枚数分だけ、次の人に手札の不要なカードを渡せるルールです。</p>
        <ul class="rule-list daifugo-list" style="margin-top: 15px;">
            <li>「7」を出すと、自分の手札から好きなカードを選んで次の順番の人に押し付けることができます。</li>
            <li>あがりに直結しやすいため、大富豪では非常に強力なカードになります。</li>
            <li>渡されたくない人はパスをするか、より強いカードをすぐに出す必要があります。</li>
        </ul>
