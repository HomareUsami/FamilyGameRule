    <h1>13（K）キャンセル</h1>
    <div class="card">
        <h2 class="card-title">概要</h2>
        <p class="card-desc">「K（13）」を出すと、直前に出されたカードの特殊効果を無効化できるルールです。</p>
        <ul class="rule-list daifugo-list" style="margin-top: 15px;">
            <li>例えば、前の人が「8」を出して8切りをしようとした直後に「K」を出すことで、8切りを無効化（キャンセル）してそのまま場を継続させることができます。</li>
            <li>「11バック」などの効果を消すのにも使われます。</li>
        </ul>
    </div>
