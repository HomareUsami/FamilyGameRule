    <h1>革命</h1>
    <div class="card">
        <h2 class="card-title">概要</h2>
        <p class="card-desc">カードの強さが逆転する一発逆転のルールです。</p>
        <ul class="rule-list daifugo-list" style="margin-top: 15px;">
            <li>同じ数字のカードを4枚以上同時に出すと「革命」となります。</li>
            <li>革命中は、最弱の「3」が最強になり、最強の「2」が最弱になります。</li>
            <li>再度誰かが革命を起こす（革命返し）まで、この状態は継続します。</li>
        </ul>
    </div>
    <script src="../app.js"></script>
