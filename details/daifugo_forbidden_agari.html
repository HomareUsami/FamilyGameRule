    <h1>反則あがり（禁止あがり）</h1>
    <div class="card">
        <h2 class="card-title">概要</h2>
        <p class="card-desc">特定の強いカードや特殊なカードを最後に出してあがる（手札を無くす）ことを禁止するルールです。</p>
        <ul class="rule-list daifugo-list" style="margin-top: 15px;">
            <li><b>ジョーカーあがり禁止:</b> ジョーカーを出してあがると反則負け（即座に大貧民）になります。</li>
            <li><b>2あがり禁止:</b> 最強の数字である「2」であがることを禁止します。革命中は最弱になるため、「3」であがることが禁止（3あがり禁止）に変わるのが一般的です。</li>
            <li><b>8あがり禁止:</b> 8切りを発生させてあがることを禁止します。</li>
        </ul>
    </div>
    <script src="../app.js"></script>
