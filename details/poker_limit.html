    <h1>ベット上限（リミット）</h1>
    <div class="card">
        <h2 class="card-title">概要</h2>
        <p class="card-desc">1回の賭け（ベット）で出せるチップの最大額を制限するルールです。</p>
        <ul class="rule-list" style="margin-top: 15px;">
            <li><b>ノーリミット:</b> 上限なし。いつでも自分の持っている全額（オールイン）を賭けられます。</li>
            <li><b>ポットリミット:</b> 現在場に出ている総額（ポット）と同じ額までしか賭けられません。</li>
            <li><b>フィックスドリミット:</b> あらかじめ決められた固定額しか賭けられません。</li>
        </ul>
    </div>
    <script src="../app.js"></script>
