    <h1>リバース（9・Qなど）</h1>
    <div class="card">
        <h2 class="card-title">概要</h2>
        <p class="card-desc">特定のカードを出すと、カードを出す順番が逆回りになるルールです。</p>
        <ul class="rule-list daifugo-list" style="margin-top: 15px;">
            <li>「9」や「Q（12）」にこの役割を持たせることが多いです（9リバース、Qリバースなど）。</li>
            <li>右回りだったものが左回りになるため、直前に出した人が再び出せるチャンスが巡ってくることもあります。</li>
        </ul>
    </div>
