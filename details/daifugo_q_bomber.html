    <h1>12（Q）ボンバー</h1>
    <div class="card">
        <h2 class="card-title">概要</h2>
        <p class="card-desc">「Q（12）」を出したプレイヤーが、他のプレイヤーの手札を破壊（捨てさせる）できるルールです。</p>
        <ul class="rule-list daifugo-list" style="margin-top: 15px;">
            <li>Qを出したプレイヤーは、好きな数字（例：「8」など）を指定します。</li>
            <li>他の全員は、手札にその数字があれば、「Qが出された枚数分」だけ捨てなければなりません。</li>
            <li>他人のあがりを阻止したり、ペアを崩したりする強力な妨害カードです。</li>
        </ul>
