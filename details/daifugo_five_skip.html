    <h1>5飛び</h1>
    <div class="card">
        <h2 class="card-title">概要</h2>
        <p class="card-desc">「5」を出した枚数分、次の人の順番をスキップ（飛ばす）するルールです。</p>
        <ul class="rule-list daifugo-list" style="margin-top: 15px;">
            <li>「5」を1枚出せば次の人がスキップされ、2枚出せば2人スキップされます。</li>
            <li>多人数でプレイする際に、特定の順番のプレイヤーを妨害する戦略として使われます。</li>
        </ul>
    </div>
