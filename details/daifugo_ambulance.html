    <h1>救急車</h1>
    <div class="card">
        <h2 class="card-title">概要</h2>
        <p class="card-desc">「9」を2枚同時に出すと、8切りと同じ効果（場が流れる）が発生するローカルルールです。</p>
        <ul class="rule-list daifugo-list" style="margin-top: 15px;">
            <li>「9（く）9（きゅう）」の語呂合わせに由来するユニークなルールです。</li>
            <li>地域によっては、場が流れた後に「他のプレイヤーにカードを押し付ける」などの追加効果がある場合もあります。</li>
            <li>8切りと同様に、強力な戦術として機能します。</li>
        </ul>
    </div>
