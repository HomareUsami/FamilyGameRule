    <h1>11バック（Jバック）</h1>
    <div class="card">
        <h2 class="card-title">概要</h2>
        <p class="card-desc">一時的な革命を起こすルールです。</p>
        <ul class="rule-list daifugo-list" style="margin-top: 15px;">
            <li>「J（11）」のカードを出すと、その場が流れるまでの間、一時的にカードの強さが逆転します。</li>
            <li>場が流れると、強さは元に戻ります。</li>
            <li>通常の革命と異なり、手軽に状況を変えることができるため展開がスピーディになります。</li>
        </ul>
    </div>
