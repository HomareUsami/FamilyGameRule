<body>

    <h1>ブラインド（強制ベット）</h1>
    <div class="card">
        <h2 class="card-title">概要</h2>
        <p class="card-desc">テキサスホールデムなどで採用される、ゲーム開始時に強制的にチップを賭けさせるルールです。</p>
        <ul class="rule-list" style="margin-top: 15px;">
            <li>カードが配られる前に、ディーラーボタン（親）の左隣の人が<b>スモールブラインド(SB)</b>、さらにその左隣の人が<b>ビッグブラインド(BB)</b>としてチップを強制的に出します。</li>
            <li>BBはSBの2倍の額を出すのが一般的です。</li>
            <li>場に最初からチップがあることで、誰もベットせずに全員がフォールドするのを防ぐ役割があります。</li>
        </ul>
    </div>
    <script src="../app.js"></script>
</body>
</html>
