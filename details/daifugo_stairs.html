<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大富豪 - 階段詳細</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="nav">
        <a href="#" id="back-btn">戻る</a>
        <a href="../index.html">トップ</a>
    </div>
    <h1>階段</h1>
    <div class="card">
        <h2 class="card-title">概要</h2>
        <p class="card-desc">同じマークで数字が連続しているカードを3枚以上まとめて出せるルールです。</p>
        <ul class="rule-list daifugo-list" style="margin-top: 15px;">
            <li>例：スペードの3・4・5</li>
            <li>次の人は、同じ枚数でより強い階段を出さなければなりません。（例：スペードの5・6・7）</li>
            <li>「階段革命」として、4枚以上の階段が出た場合に革命を起こすルールもあります。</li>
        </ul>
    </div>
    <script src="../app.js"></script>
</body>
</html>
