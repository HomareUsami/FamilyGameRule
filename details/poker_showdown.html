<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>ポーカー - ショーダウン詳細</title>

</head>
<body>
    <div class="nav">
        <a href="#" id="back-btn">戻る</a>
        <a href="../index.html">トップ</a>
    </div>
    <h1>ショーダウン</h1>
    <div class="card">
        <h2 class="card-title">概要</h2>
        <p class="card-desc">最後のベッティングラウンドが終了し、複数のプレイヤーが残っている場合、手札を開いて勝敗を決めるフェーズです。</p>
        <ul class="rule-list" style="margin-top: 15px;">
            <li><b>開く順番:</b> 最後にベットまたはレイズをしたプレイヤーから手札を開きます。誰もベットせず全員チェックだった場合は、ボタンの左隣（SB）から開きます。</li>
            <li><b>マック (Muck):</b> 自分より前に手札を開いた人の方が自分より強い役だった場合、自分の手札を誰にも見せずに伏せて捨てる（負けを認める）ことができます。</li>
        </ul>
    </div>
    <script src="../app.js"></script>
</body>
</html>
