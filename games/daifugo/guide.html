<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大富豪 - 遊び方</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <div class="nav">
        <a href="overview.html" id="back-btn">戻る</a>
        <a href="../../index.html">トップ</a>
    </div>
    <h1>大富豪 - 遊び方</h1>
    
    <div class="card">
        <h2 class="card-title">1. カードを配る</h2>
        <p class="card-desc">ジョーカーを含めたカードを全プレイヤーに均等に配りきります。</p>
    </div>
    <div class="card">
        <h2 class="card-title">2. カードを出す</h2>
        <p class="card-desc">ダイヤの3を持っている人から時計回りに、前の人が出したカードより強いカードを出していきます。</p>
    </div>
    <div class="card">
        <h2 class="card-title">3. パス</h2>
        <p class="card-desc">出せるカードがない、または戦略的に出したくない場合は「パス」ができます。</p>
    </div>
    <div class="card">
        <h2 class="card-title">4. 場が流れる</h2>
        <p class="card-desc">全員がパスをすると「場が流れ」ます。最後にカードを出した人が、好きなカードを出して再開します。</p>
    </div>

    <a href="categories.html" class="btn">ルール一覧へ進む</a>
    
    <script src="../../app.js"></script>
</body>
</html>
