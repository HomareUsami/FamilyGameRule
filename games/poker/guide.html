<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポーカー - 遊び方</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <div class="nav">
        <a href="overview.html" id="back-btn">戻る</a>
        <a href="../../index.html">トップ</a>
    </div>
    <h1>ポーカー - 遊び方</h1>
    
    <div class="card">
        <h2 class="card-title">1. カードを配る</h2>
        <p class="card-desc">参加費（アンティ）を支払い、ディーラーが各プレイヤーに5枚ずつカードを裏向きで配ります。</p>
    </div>
    <div class="card">
        <h2 class="card-title">2. 第1ラウンド（ベット）</h2>
        <p class="card-desc">手札を見て、勝負するかどうかを決めます。チップを賭ける（ベット）、降りる（フォールド）などを選択します。</p>
    </div>
    <div class="card">
        <h2 class="card-title">3. カード交換（ドロー）</h2>
        <p class="card-desc">勝負に残ったプレイヤーは、不要なカードを捨てて山札から新しいカードを引くことができます。</p>
    </div>
    <div class="card">
        <h2 class="card-title">4. 第2ラウンド〜勝敗</h2>
        <p class="card-desc">再度ベットを行い、最後まで残ったプレイヤー同士で手札を見せ合います（ショーダウン）。最も強い役の人がチップを総取りします。</p>
    </div>

    <a href="categories.html" class="btn">ルール一覧へ進む</a>
    
    <script src="../../app.js"></script>
</body>
</html>
